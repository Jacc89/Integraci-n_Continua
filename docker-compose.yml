version: '3.9'

services:

  frontend:
    build: ./Front
    ports:
      - "4200:4200"
    depends_on:
      - backend

  backend:
    build: ./Backend
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: proyecto_db

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proyecto_db
    ports:
      - "3306:3306"